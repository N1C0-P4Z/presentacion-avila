<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Cobalt Grid — Preview</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Newsreader:ital,opsz,wght@0,6..72,300;0,6..72,500;0,6..72,700;1,6..72,300;1,6..72,500&family=DM+Mono:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  /* === RESET & BASE === */
  *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: #1a1a1a;
    display: flex;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
    overflow: hidden;
    font-family: 'Newsreader', 'Georgia', serif;
  }

  /* === FIXED 16:9 STAGE === */
  .stage {
    position: relative;
    width: 1920px;
    height: 1080px;
    flex-shrink: 0;
    transform-origin: center center;
    overflow: hidden;
    background: #F0EBDE;
  }

  /* Responsive scaling */
  @media (max-width: 1920px) {
    .stage { transform: scale(calc(100vw / 1920)); }
  }
  @media (max-height: 1080px) and (min-width: 1920px) {
    .stage { transform: scale(calc(100vh / 1080)); }
  }
  @media (max-width: 1920px) and (max-height: 1080px) {
    .stage { transform: scale(calc(min(100vw / 1920, 100vh / 1080))); }
  }

  /* === GRAPH PAPER GRID (permanent background) === */
  .stage::before {
    content: '';
    position: absolute;
    inset: 0;
    background-image:
      linear-gradient(rgba(31, 43, 224, 0.07) 1px, transparent 1px),
      linear-gradient(90deg, rgba(31, 43, 224, 0.07) 1px, transparent 1px);
    background-size: 40px 40px;
    z-index: 0;
    pointer-events: none;
  }

  /* === COBALT HAIRLINE FRAME — top & bottom === */
  .frame-top,
  .frame-bottom {
    position: absolute;
    left: 60px;
    right: 60px;
    height: 1.5px;
    background: #1F2BE0;
    z-index: 2;
    pointer-events: none;
  }
  .frame-top    { top: 40px; }
  .frame-bottom { bottom: 40px; }

  /* === PIXEL-GLITCH DECORATION (right side) === */
  .pixel-glitch {
    position: absolute;
    right: 72px;
    top: 160px;
    width: 20px;
    display: flex;
    flex-direction: column;
    gap: 3px;
    z-index: 2;
    opacity: 0.5;
  }
  .pixel-glitch span {
    display: block;
    height: 4px;
    background: #1F2BE0;
    border-radius: 1px;
  }
  .pixel-glitch span:nth-child(1) { width: 8px;  margin-left: 12px; }
  .pixel-glitch span:nth-child(2) { width: 14px; margin-left: 6px;  }
  .pixel-glitch span:nth-child(3) { width: 20px; margin-left: 0;    }
  .pixel-glitch span:nth-child(4) { width: 14px; margin-left: 6px;  }
  .pixel-glitch span:nth-child(5) { width: 6px;  margin-left: 14px; }
  .pixel-glitch span:nth-child(6) { width: 12px; margin-left: 8px;  }
  .pixel-glitch span:nth-child(7) { width: 18px; margin-left: 2px;  }

  /* === QR-BLOCK PATCH (bottom-right) === */
  .qr-block {
    position: absolute;
    right: 80px;
    bottom: 80px;
    display: grid;
    grid-template-columns: repeat(5, 6px);
    grid-template-rows: repeat(5, 6px);
    gap: 1.5px;
    z-index: 2;
    opacity: 0.25;
  }
  .qr-block .cell {
    background: #1F2BE0;
    border-radius: 0.5px;
  }
  .qr-block .cell.empty { background: transparent; }

  /* === CONTENT LAYOUT === */
  .content {
    position: absolute;
    inset: 0;
    padding: 120px 120px 100px;
    display: flex;
    flex-direction: column;
    justify-content: center;
    z-index: 1;
  }

  /* === TOP TAG === */
  .tag {
    font-family: 'DM Mono', monospace;
    font-size: 14px;
    font-weight: 400;
    color: #5560E5;
    letter-spacing: 2px;
    text-transform: uppercase;
    margin-bottom: 24px;
    opacity: 0;
    animation: revealUp 0.7s ease 0.2s forwards;
  }

  /* === TITLE === */
  .title-main {
    font-family: 'Newsreader', Georgia, serif;
    font-size: 72px;
    font-weight: 700;
    color: #1F2BE0;
    line-height: 1.1;
    letter-spacing: -1.5px;
    max-width: 1100px;
    opacity: 0;
    animation: revealUp 0.8s ease 0.5s forwards;
  }
  .title-main .subdued {
    color: #2a2a2a;
    font-weight: 500;
  }

  /* === DIVIDER RULE === */
  .rule {
    width: 80px;
    height: 1.5px;
    background: #1F2BE0;
    margin: 32px 0;
    opacity: 0;
    animation: revealUp 0.6s ease 1.0s forwards;
  }

  /* === SUBTITLE === */
  .subtitle {
    font-family: 'DM Mono', monospace;
    font-size: 20px;
    font-weight: 300;
    color: #2a2a2a;
    line-height: 1.6;
    max-width: 680px;
    opacity: 0;
    animation: revealUp 0.7s ease 1.3s forwards;
  }
  .subtitle em {
    font-family: 'Newsreader', Georgia, serif;
    font-style: italic;
    color: #1F2BE0;
  }

  /* === FOOTER === */
  .footer {
    position: absolute;
    bottom: 70px;
    left: 120px;
    right: 120px;
    display: flex;
    justify-content: space-between;
    font-family: 'DM Mono', monospace;
    font-size: 13px;
    color: #6a6558;
    z-index: 2;
    opacity: 0;
    animation: revealUp 0.7s ease 1.8s forwards;
  }
  .footer-col {
    display: flex;
    flex-direction: column;
    gap: 3px;
  }
  .footer-col .name {
    color: #1F2BE0;
    font-weight: 500;
  }

  /* === PAGE NUMBER === */
  .page-num {
    position: absolute;
    bottom: 70px;
    right: 120px;
    font-family: 'DM Mono', monospace;
    font-size: 14px;
    font-weight: 400;
    color: #1F2BE0;
    z-index: 2;
    opacity: 0;
    animation: revealUp 0.6s ease 2.2s forwards;
  }

  /* === ANIMATIONS === */
  @keyframes revealUp {
    from { opacity: 0; transform: translateY(20px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  @media (prefers-reduced-motion: reduce) {
    .tag, .title-main, .rule, .subtitle, .footer, .page-num {
      opacity: 1 !important;
      animation: none !important;
    }
  }
</style>
</head>
<body>
<div class="stage" role="main">

  <!-- Hairline frame -->
  <div class="frame-top"></div>
  <div class="frame-bottom"></div>

  <!-- Pixel-glitch decoration -->
  <div class="pixel-glitch">
    <span></span><span></span><span></span>
    <span></span><span></span><span></span><span></span>
  </div>

  <!-- QR-block patch -->
  <div class="qr-block">
    <span class="cell"></span><span class="cell"></span><span class="cell"></span><span class="cell"></span><span class="cell"></span>
    <span class="cell"></span><span class="cell empty"></span><span class="cell empty"></span><span class="cell empty"></span><span class="cell"></span>
    <span class="cell"></span><span class="cell empty"></span><span class="cell"></span><span class="cell empty"></span><span class="cell"></span>
    <span class="cell"></span><span class="cell empty"></span><span class="cell empty"></span><span class="cell empty"></span><span class="cell"></span>
    <span class="cell"></span><span class="cell"></span><span class="cell"></span><span class="cell"></span><span class="cell"></span>
  </div>

  <!-- Content -->
  <div class="content">
    <div class="tag">Instituto Politécnico Superior · 6to Informática</div>

    <h1 class="title-main">
      Ingeniería del<br>
      Mantenimiento de <span class="subdued">Software</span>
    </h1>

    <div class="rule"></div>

    <p class="subtitle">
      <em>La realidad</em> del ciclo de vida del código
    </p>
  </div>

  <!-- Footer -->
  <div class="footer">
    <div class="footer-col">
      <span>Docente: <span class="name">Paula Ávila</span></span>
      <span>Estudiantes: <span class="name">S. Cañal · N. Paz Reyes · V. Aviani · M. Moloeznik</span></span>
    </div>
  </div>

  <!-- Page number -->
  <div class="page-num">01 / 26</div>

</div>
</body>
</html>
