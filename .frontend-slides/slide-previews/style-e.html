<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=1920, initial-scale=1">
<title>Slide — Pink Script After Hours REMIX</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=Inter:wght@300&family=JetBrains+Mono:wght@300;400&display=swap" rel="stylesheet">
<style>
  *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}

  :root{
    --bg:       #060507;
    --surface:  #1A1218;
    --alt:      #0F0D11;
    --paper:    #F5EDF1;
    --gold:     #FFD700;
    --gold-amber:#FFC107;
    --gold-orange:#FF8C00;
    --gold-bright:#FFE44D;
    --gold-deep: #B8860B;
    --text:     #F5EDF1;
  }

  html,body{
    width:100%;height:100%;overflow:hidden;
    background:var(--bg);
    font-family:'Inter',sans-serif;
    font-weight:300;
    color:var(--text);
    -webkit-font-smoothing:antialiased;
  }

  /* ── viewport wrapper ── */
  .viewport{
    width:100vw;height:100vh;
    display:flex;align-items:center;justify-content:center;
    overflow:hidden;
    position:relative;
  }

  /* ── fixed stage 1920×1080 ── */
  .stage{
    width:1920px;height:1080px;
    position:relative;
    transform-origin:center center;
    background:
      radial-gradient(ellipse 70% 60% at 15% 10%, rgba(26,18,24,1) 0%, var(--bg) 100%);
    overflow:hidden;
    display:flex;
    flex-direction:column;
    align-items:center;
    justify-content:center;
  }

  /* ── film-grain overlay via SVG filter ── */
  .grain-overlay{
    position:absolute;
    inset:0;
    z-index:100;
    pointer-events:none;
    mix-blend-mode:screen;
    opacity:0.08;
    width:100%;
    height:100%;
  }

  /* ── hairline interior frame ── */
  .stage::after{
    content:'';position:absolute;z-index:90;pointer-events:none;
    inset:36px;
    border:1px solid rgba(245,237,241,.14);
  }

  /* ── gold glow behind title ── */
  .title-glow{
    position:absolute;
    top:50%;
    left:50%;
    transform:translate(-50%,-55%);
    width:800px;
    height:400px;
    background:radial-gradient(ellipse at center, rgba(255,215,0,0.12) 0%, rgba(255,215,0,0.04) 40%, transparent 70%);
    z-index:5;
    pointer-events:none;
    filter:blur(40px);
  }

  /* ── staggered reveal ── */
  @keyframes fadeUp{
    from{opacity:0;transform:translateY(32px)}
    to  {opacity:1;transform:translateY(0)}
  }

  .reveal{
    opacity:0;
    animation:fadeUp .8s cubic-bezier(.23,1,.32,1) forwards;
  }

  @media(prefers-reduced-motion:reduce){
    .reveal{opacity:1;transform:none;animation:none}
    .title-glow{display:none}
  }

  /* ── content layers ── */
  .content-wrap{
    position:relative;z-index:10;
    display:flex;flex-direction:column;align-items:center;
    justify-content:center;
    text-align:center;
    padding:0 140px;
    gap:0;
  }

  /* ── kicker ── */
  .kicker{
    font-family:'JetBrains Mono',monospace;
    font-weight:300;
    font-size:13px;
    letter-spacing:6px;
    text-transform:uppercase;
    color:var(--gold);
    margin-bottom:48px;
    animation-delay:.1s;
  }

  /* ── decorative gold rule ── */
  .gold-rule{
    width:72px;height:1px;
    background:linear-gradient(90deg, transparent, var(--gold-bright), transparent);
    margin-bottom:44px;
    animation-delay:.2s;
  }

  /* ── main title ── */
  .title-main{
    font-family:'DM Serif Display',serif;
    font-style:italic;
    font-size:86px;
    line-height:1.05;
    letter-spacing:-1px;
    color:var(--gold);
    max-width:1200px;
    margin-bottom:28px;
    animation-delay:.35s;
    text-shadow:
      0 0 80px rgba(255,215,0,0.25),
      0 0 40px rgba(255,215,0,0.15),
      0 0 20px rgba(255,224,77,0.1);
  }

  /* ── subtitle ── */
  .subtitle{
    font-family:'Inter',sans-serif;
    font-weight:300;
    font-size:22px;
    letter-spacing:1px;
    color:rgba(245,237,241,.55);
    margin-bottom:56px;
    animation-delay:.55s;
  }

  /* ── bottom gold rule ── */
  .gold-rule-bottom{
    width:48px;height:1px;
    background:linear-gradient(90deg, transparent, var(--gold-deep), transparent);
    margin-bottom:36px;
    animation-delay:.65s;
  }

  /* ── footer ── */
  .footer{
    font-family:'JetBrains Mono',monospace;
    font-weight:300;
    font-size:11.5px;
    letter-spacing:1.5px;
    text-transform:uppercase;
    color:rgba(245,237,241,.32);
    max-width:1100px;
    line-height:1.9;
    animation-delay:.75s;
  }

  .footer span{
    color:var(--gold-deep);
    opacity:.7;
  }

  /* ── page number ── */
  .page-num{
    position:absolute;
    bottom:52px;
    right:60px;
    z-index:20;
    font-family:'JetBrains Mono',monospace;
    font-weight:300;
    font-size:12px;
    letter-spacing:2px;
    color:rgba(245,237,241,.25);
    animation-delay:.9s;
  }

  /* ── scaling media queries ── */
  @media(max-width:1920px){
    .stage{transform:scale(calc(100vw / 1920))}
  }
  @media(max-height:1080px) and (min-width:1920px){
    .stage{transform:scale(calc(100vh / 1080))}
  }
  @media(max-width:1920px) and (max-height:1080px){
    .stage{transform:scale(calc(min(100vw / 1920, 100vh / 1080)))}
  }
</style>
</head>
<body>

<div class="viewport">
  <div class="stage">

    <!-- film grain via SVG feTurbulence -->
    <svg class="grain-overlay" xmlns="http://www.w3.org/2000/svg" width="100%" height="100%">
      <filter id="filmGrain">
        <feTurbulence type="fractalNoise" baseFrequency="0.85" numOctaves="4" stitchTiles="stitch"/>
      </filter>
      <rect width="100%" height="100%" filter="url(#filmGrain)"/>
    </svg>

    <!-- gold glow halo -->
    <div class="title-glow"></div>

    <div class="content-wrap">

      <p class="kicker reveal">Instituto Politécnico Superior · 6to Informática</p>

      <div class="gold-rule reveal"></div>

      <h1 class="title-main reveal">
        Ingeniería del Mantenimiento<br>de Software
      </h1>

      <p class="subtitle reveal">La realidad del ciclo de vida del código</p>

      <div class="gold-rule-bottom reveal"></div>

      <p class="footer reveal">
        Docente: Paula Ávila <span>·</span> Estudiantes: S. Cañal, N. Paz Reyes, V. Aviani, M. Moloeznik
      </p>

    </div>

    <p class="page-num reveal">01 / 26</p>

  </div>
</div>

<script>
(function(){
  const stage=document.querySelector('.stage');
  function scale(){
    const vw=window.innerWidth,vh=window.innerHeight;
    const s=Math.min(vw/1920,vh/1080);
    stage.style.transform='scale('+s+')';
  }
  scale();
  window.addEventListener('resize',scale);
})();
</script>

</body>
</html>
