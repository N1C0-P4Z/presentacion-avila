<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Slate Forge — Preview</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;500;600;700;800&family=DM+Sans:opsz,wght@9..40,300;9..40,400;9..40,500&display=swap" rel="stylesheet">
<style>
  /* === RESET & BASE === */
  *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: #0a0a0a;
    display: flex;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
    overflow: hidden;
    font-family: 'DM Sans', sans-serif;
  }

  /* === FIXED 16:9 STAGE === */
  .stage {
    position: relative;
    width: 1920px;
    height: 1080px;
    flex-shrink: 0;
    transform-origin: center center;
    overflow: hidden;
    background: #0d1117;
  }

  @media (max-width: 1920px) {
    .stage { transform: scale(calc(100vw / 1920)); }
  }
  @media (max-height: 1080px) and (min-width: 1920px) {
    .stage { transform: scale(calc(100vh / 1080)); }
  }
  @media (max-width: 1920px) and (max-height: 1080px) {
    .stage { transform: scale(calc(min(100vw / 1920, 100vh / 1080))); }
  }

  /* === ATMOSPHERIC BACKGROUND LAYERS === */
  .bg-gradient {
    position: absolute;
    inset: 0;
    background:
      radial-gradient(ellipse 90% 60% at 10% 20%, rgba(56, 189, 248, 0.08) 0%, transparent 60%),
      radial-gradient(ellipse 60% 50% at 80% 90%, rgba(245, 158, 11, 0.05) 0%, transparent 50%),
      linear-gradient(180deg, #0d1117 0%, #111827 40%, #0f172a 100%);
    z-index: 0;
  }

  /* === GEOMETRIC GRID OVERLAY === */
  .grid-overlay {
    position: absolute;
    inset: 0;
    background-image:
      linear-gradient(rgba(56, 189, 248, 0.04) 1px, transparent 1px),
      linear-gradient(90deg, rgba(56, 189, 248, 0.04) 1px, transparent 1px);
    background-size: 60px 60px;
    z-index: 0;
    pointer-events: none;
  }

  /* === CORNER BRACKET DECORATIONS === */
  .corner-bracket {
    position: absolute;
    width: 60px;
    height: 60px;
    z-index: 2;
    opacity: 0.3;
  }
  .corner-bracket::before,
  .corner-bracket::after {
    content: '';
    position: absolute;
    background: #38bdf8;
  }
  .corner-bracket.tl { top: 60px; left: 60px; }
  .corner-bracket.tl::before { top: 0; left: 0; width: 40px; height: 2px; }
  .corner-bracket.tl::after  { top: 0; left: 0; width: 2px; height: 40px; }

  .corner-bracket.br { bottom: 60px; right: 60px; }
  .corner-bracket.br::before { bottom: 0; right: 0; width: 40px; height: 2px; }
  .corner-bracket.br::after  { bottom: 0; right: 0; width: 2px; height: 40px; }

  /* === ACCENT BAR (left edge) === */
  .accent-bar {
    position: absolute;
    top: 0;
    left: 0;
    width: 6px;
    height: 100%;
    background: linear-gradient(180deg, #38bdf8 0%, #0ea5e9 40%, #f59e0b 100%);
    z-index: 2;
  }

  /* === TOP NAV LINE === */
  .top-line {
    position: absolute;
    top: 44px;
    left: 100px;
    right: 100px;
    display: flex;
    justify-content: space-between;
    font-size: 13px;
    font-weight: 400;
    color: #4b5563;
    z-index: 2;
    letter-spacing: 1px;
    text-transform: uppercase;
    opacity: 0;
    animation: fadeSlide 0.7s ease 0.3s forwards;
  }

  /* === MAIN CONTENT === */
  .content {
    position: absolute;
    inset: 0;
    padding: 120px 140px;
    display: flex;
    flex-direction: column;
    justify-content: center;
    z-index: 1;
  }

  /* === KICKER === */
  .kicker {
    font-family: 'Syne', sans-serif;
    font-size: 14px;
    font-weight: 600;
    color: #38bdf8;
    letter-spacing: 4px;
    text-transform: uppercase;
    margin-bottom: 16px;
    opacity: 0;
    animation: fadeSlide 0.7s ease 0.2s forwards;
  }

  /* === TITLE === */
  .title-main {
    font-family: 'Syne', sans-serif;
    font-size: 76px;
    font-weight: 800;
    color: #f1f5f9;
    line-height: 1.05;
    letter-spacing: -2px;
    max-width: 1100px;
    opacity: 0;
    animation: fadeSlide 0.8s ease 0.5s forwards;
  }
  .title-main .accent {
    background: linear-gradient(135deg, #38bdf8 0%, #818cf8 50%, #f59e0b 100%);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
  }

  /* === DIVIDER === */
  .divider {
    display: flex;
    align-items: center;
    gap: 16px;
    margin: 28px 0;
    opacity: 0;
    animation: fadeSlide 0.6s ease 1.0s forwards;
  }
  .divider .rule {
    width: 60px;
    height: 2px;
    background: #38bdf8;
    border-radius: 1px;
    opacity: 0.6;
  }
  .divider .rule.amber { background: #f59e0b; width: 40px; }

  /* === SUBTITLE === */
  .subtitle {
    font-size: 22px;
    font-weight: 300;
    color: #94a3b8;
    line-height: 1.5;
    max-width: 700px;
    opacity: 0;
    animation: fadeSlide 0.7s ease 1.3s forwards;
  }
  .subtitle strong {
    font-weight: 500;
    color: #e2e8f0;
  }

  /* === FOOTER === */
  .footer {
    position: absolute;
    bottom: 60px;
    left: 140px;
    right: 140px;
    display: flex;
    justify-content: space-between;
    align-items: flex-end;
    z-index: 2;
    opacity: 0;
    animation: fadeSlide 0.7s ease 1.8s forwards;
  }
  .footer-left {
    display: flex;
    flex-direction: column;
    gap: 4px;
  }
  .footer-left .line {
    font-size: 14px;
    font-weight: 400;
    color: #4b5563;
  }
  .footer-left .line strong {
    color: #94a3b8;
    font-weight: 500;
  }
  .footer-left .line .highlight-cyan {
    color: #38bdf8;
  }
  .footer-right {
    font-size: 14px;
    font-weight: 500;
    color: #4b5563;
    letter-spacing: 1px;
  }

  /* === ANIMATIONS === */
  @keyframes fadeSlide {
    from { opacity: 0; transform: translateY(18px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  @media (prefers-reduced-motion: reduce) {
    .top-line, .kicker, .title-main, .divider, .subtitle, .footer {
      opacity: 1 !important;
      animation: none !important;
    }
  }
</style>
</head>
<body>
<div class="stage" role="main">

  <!-- Background layers -->
  <div class="bg-gradient"></div>
  <div class="grid-overlay"></div>

  <!-- Accent bar -->
  <div class="accent-bar"></div>

  <!-- Corner brackets -->
  <div class="corner-bracket tl"></div>
  <div class="corner-bracket br"></div>

  <!-- Top nav -->
  <div class="top-line">
    <span>Instituto Politécnico Superior Gral. San Martín</span>
    <span>6to Informática · 2025</span>
  </div>

  <!-- Content -->
  <div class="content">
    <div class="kicker">Ingeniería de Software</div>

    <h1 class="title-main">
      Mantenimiento<br>
      de <span class="accent">Software</span>
    </h1>

    <div class="divider">
      <span class="rule"></span>
      <span class="rule amber"></span>
    </div>

    <p class="subtitle">
      <strong>La realidad</strong> del ciclo de vida del código
    </p>
  </div>

  <!-- Footer -->
  <div class="footer">
    <div class="footer-left">
      <span class="line"><strong>Docente:</strong> <span class="highlight-cyan">Paula Ávila</span></span>
      <span class="line"><strong>Estudiantes:</strong> S. Cañal · N. Paz Reyes · V. Aviani · M. Moloeznik</span>
    </div>
    <div class="footer-right">01 / 26</div>
  </div>

</div>
</body>
</html>
