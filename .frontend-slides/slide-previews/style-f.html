<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ingeniería del Mantenimiento de Software</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Space+Grotesk:wght@500;600;700&display=swap" rel="stylesheet">
<style>
/* === DESIGN TOKENS === */
:root {
    --canvas: #FDFAE7;
    --accent: #1E2BFA;
    --text-primary: #111111;
    --text-muted: #6B6B6B;
    --text-light: #9A9A9A;
    --green: #059669;
    --red: #DC2626;
    --font-display: 'Space Grotesk', sans-serif;
    --font-body: 'Inter', sans-serif;
    --stage-bg: var(--canvas);
    --slide-bg: var(--canvas);
}

/* === VIEWPORT BASE (mandatory) === */
html,
body {
    width: 100%;
    height: 100%;
    margin: 0;
    overflow: hidden;
    background: var(--stage-bg, #000);
}

.deck-viewport {
    position: fixed;
    inset: 0;
    overflow: hidden;
    background: var(--stage-bg, #000);
}

.deck-stage {
    position: absolute;
    left: 0;
    top: 0;
    width: 1920px;
    height: 1080px;
    overflow: hidden;
    transform-origin: 0 0;
    background: var(--slide-bg, #fff);
}

.slide {
    position: absolute;
    inset: 0;
    width: 1920px;
    height: 1080px;
    overflow: hidden;
    display: block;
    visibility: hidden;
    opacity: 0;
    pointer-events: none;
    background: var(--slide-bg, #fff);
}

.slide.active,
.slide.visible {
    visibility: visible;
    opacity: 1;
    pointer-events: auto;
    z-index: 1;
}

img,
video,
canvas,
svg {
    max-width: 100%;
    max-height: 100%;
}

.deck-controls {
    position: fixed;
    left: 50%;
    bottom: 22px;
    transform: translateX(-50%);
    z-index: 1000;
}

@media print {
    html, body { width: 1920px; height: auto; overflow: visible; background: #fff; }
    .deck-viewport { position: static; overflow: visible; background: #fff; }
    .deck-stage { position: static; width: auto; height: auto; transform: none !important; background: none; }
    .slide {
        position: relative; display: block !important;
        visibility: visible !important; opacity: 1 !important;
        pointer-events: auto !important; width: 1920px; height: 1080px;
        break-after: page; page-break-after: always;
    }
    .slide:last-child { break-after: auto; page-break-after: auto; }
    .deck-controls { display: none !important; }
}

@media (prefers-reduced-motion: reduce) {
    *, *::before, *::after {
        animation-duration: 0.01ms !important;
        transition-duration: 0.2s !important;
    }
}

/* === TITLE SLIDE LAYOUT === */
.slide-title {
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: flex-start;
    padding: 120px 160px;
    font-family: var(--font-body);
    color: var(--text-primary);
    position: relative;
}

/* Subtle decorative line top-left */
.slide-title::before {
    content: '';
    position: absolute;
    top: 80px;
    left: 160px;
    width: 64px;
    height: 4px;
    background: var(--accent);
    border-radius: 2px;
}

/* === EYEBROW === */
.eyebrow {
    font-family: var(--font-body);
    font-weight: 600;
    font-size: 15px;
    letter-spacing: 2.5px;
    text-transform: uppercase;
    color: var(--accent);
    margin-bottom: 32px;
    opacity: 0;
    transform: translateY(16px);
    animation: revealUp 0.7s cubic-bezier(0.16, 1, 0.3, 1) 0.3s forwards;
}

/* === MAIN TITLE === */
.title-main {
    font-family: var(--font-display);
    font-weight: 700;
    font-size: 82px;
    line-height: 1.05;
    color: var(--text-primary);
    max-width: 1200px;
    margin: 0 0 28px 0;
    letter-spacing: -1.5px;
    opacity: 0;
    transform: translateY(24px);
    animation: revealUp 0.8s cubic-bezier(0.16, 1, 0.3, 1) 0.5s forwards;
}

/* === SUBTITLE === */
.subtitle {
    font-family: var(--font-body);
    font-weight: 400;
    font-size: 26px;
    line-height: 1.5;
    color: var(--text-muted);
    max-width: 700px;
    margin: 0 0 72px 0;
    opacity: 0;
    transform: translateY(20px);
    animation: revealUp 0.7s cubic-bezier(0.16, 1, 0.3, 1) 0.75s forwards;
}

/* === DIVIDER LINE === */
.divider {
    width: 48px;
    height: 2px;
    background: var(--accent);
    opacity: 0;
    transform: scaleX(0);
    transform-origin: left;
    animation: revealScaleX 0.6s cubic-bezier(0.16, 1, 0.3, 1) 1s forwards;
    margin-bottom: 40px;
}

/* === FOOTER / CONTEXT === */
.footer-context {
    font-family: var(--font-body);
    font-weight: 400;
    font-size: 15px;
    line-height: 1.8;
    color: var(--text-light);
    max-width: 900px;
    opacity: 0;
    transform: translateY(16px);
    animation: revealUp 0.7s cubic-bezier(0.16, 1, 0.3, 1) 1.15s forwards;
}

.footer-context strong {
    font-weight: 600;
    color: var(--text-muted);
}

/* === DECORATIVE ACCENT BLOCK (bottom-right) === */
.accent-block {
    position: absolute;
    bottom: 0;
    right: 0;
    width: 320px;
    height: 320px;
    background: var(--accent);
    opacity: 0;
    animation: revealFade 1s cubic-bezier(0.16, 1, 0.3, 1) 1.4s forwards;
}

.accent-block::before {
    content: '';
    position: absolute;
    top: -40px;
    left: -40px;
    width: 100%;
    height: 100%;
    border: 2px solid var(--accent);
    opacity: 0.15;
}

/* Small decorative pill on accent block */
.accent-block::after {
    content: '';
    position: absolute;
    bottom: 40px;
    left: 40px;
    width: 48px;
    height: 6px;
    background: rgba(255, 255, 255, 0.5);
    border-radius: 3px;
}

/* === KEYFRAMES === */
@keyframes revealUp {
    to {
        opacity: 1;
        transform: translateY(0);
    }
}

@keyframes revealScaleX {
    to {
        opacity: 1;
        transform: scaleX(1);
    }
}

@keyframes revealFade {
    to {
        opacity: 1;
    }
}

/* === REDUCED MOTION === */
@media (prefers-reduced-motion: reduce) {
    .eyebrow,
    .title-main,
    .subtitle,
    .divider,
    .footer-context,
    .accent-block {
        animation: none;
        opacity: 1;
        transform: none;
    }
}
</style>
</head>
<body>
<div class="deck-viewport">
    <div class="deck-stage">
        <!-- === TITLE SLIDE === -->
        <div class="slide active visible" id="slide-1">
            <div class="slide-title">
                <span class="eyebrow">6to Informática · Ciclo Lectivo 2025</span>

                <h1 class="title-main">Ingeniería del<br>Mantenimiento de Software</h1>

                <p class="subtitle">La realidad del ciclo de vida del código</p>

                <div class="divider"></div>

                <div class="footer-context">
                    <strong>Docente:</strong> Paula Ávila<br>
                    <strong>Estudiantes:</strong> Santiago Cañal, Nicolás Paz Reyes, Valentino Aviani, Martín Moloeznik<br>
                    Instituto Politécnico Superior Gral. San Martín
                </div>
            </div>

            <!-- Decorative accent block -->
            <div class="accent-block"></div>
        </div>
    </div>
</div>

<script>
/* === VIEWPORT SCALING === */
(function() {
    const stage = document.querySelector('.deck-stage');
    const viewport = document.querySelector('.deck-viewport');

    function resize() {
        const vw = viewport.clientWidth;
        const vh = viewport.clientHeight;
        const scale = Math.min(vw / 1920, vh / 1080);
        const x = (vw - 1920 * scale) / 2;
        const y = (vh - 1080 * scale) / 2;
        stage.style.transform = `translate(${x}px, ${y}px) scale(${scale})`;
    }

    resize();
    window.addEventListener('resize', resize);
})();
</script>
</body>
</html>
