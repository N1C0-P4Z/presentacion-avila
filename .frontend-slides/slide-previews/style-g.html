<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ingeniería del Mantenimiento de Software</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:opsz,wght@12..96,200..800&family=DM+Mono:wght@400;500&family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;1,9..40,400&display=swap');

  *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

  html, body {
    width: 100%; height: 100%;
    overflow: hidden;
    background: #232E26;
  }

  .viewport {
    width: 100vw; height: 100vh;
    display: flex; align-items: center; justify-content: center;
    overflow: hidden;
  }

  .stage {
    width: 1920px; height: 1080px;
    position: relative;
    transform-origin: center center;
    background: #232E26;
    overflow: hidden;
    font-family: 'DM Sans', sans-serif;
    color: #F0E8D2;
  }

  /* Atmospheric wood-glow from bottom-right */
  .stage::before {
    content: '';
    position: absolute;
    bottom: -200px; right: -200px;
    width: 900px; height: 900px;
    background: radial-gradient(circle, rgba(122, 78, 36, 0.35) 0%, rgba(122, 78, 36, 0.12) 35%, transparent 70%);
    pointer-events: none;
    z-index: 0;
  }

  /* Subtle secondary glow top-left for depth */
  .stage::after {
    content: '';
    position: absolute;
    top: -100px; left: -100px;
    width: 600px; height: 600px;
    background: radial-gradient(circle, rgba(122, 78, 36, 0.08) 0%, transparent 60%);
    pointer-events: none;
    z-index: 0;
  }

  /* Content layer */
  .slide-content {
    position: relative;
    z-index: 1;
    width: 100%; height: 100%;
    display: flex;
    flex-direction: column;
    justify-content: center;
    padding: 100px 120px 80px 120px;
  }

  /* Kicker — burnt orange accent label */
  .kicker {
    font-family: 'DM Mono', monospace;
    font-size: 14px;
    font-weight: 500;
    text-transform: uppercase;
    letter-spacing: 3px;
    color: #C07030;
    margin-bottom: 28px;
    opacity: 0;
    transform: translateY(12px);
    animation: fadeUp 0.7s ease-out 0.3s forwards;
  }

  /* Title — Bricolage Grotesque, mixed case, NEVER uppercase */
  .title {
    font-family: 'Bricolage Grotesque', sans-serif;
    font-size: 82px;
    font-weight: 700;
    line-height: 1.05;
    color: #F0E8D2;
    max-width: 1200px;
    margin-bottom: 20px;
    opacity: 0;
    transform: translateY(16px);
    animation: fadeUp 0.8s ease-out 0.5s forwards;
  }

  /* Subtitle */
  .subtitle {
    font-family: 'DM Sans', sans-serif;
    font-size: 28px;
    font-weight: 300;
    color: #F0E8D2;
    opacity: 0.7;
    margin-bottom: 0;
    max-width: 900px;
    opacity: 0;
    transform: translateY(12px);
    animation: fadeUp 0.7s ease-out 0.7s forwards;
  }

  /* Divider — thin accent line */
  .divider {
    width: 80px;
    height: 3px;
    background: #C07030;
    margin: 40px 0;
    opacity: 0;
    transform: scaleX(0);
    transform-origin: left;
    animation: scaleIn 0.6s ease-out 0.9s forwards;
  }

  /* Info-card inset — cream paper on dark canvas */
  .info-card {
    background: #EDE6D0;
    border-radius: 6px;
    padding: 28px 36px;
    max-width: 720px;
    position: relative;
    opacity: 0;
    transform: translateY(12px);
    animation: fadeUp 0.7s ease-out 1.1s forwards;
  }

  .info-card::before {
    content: '';
    position: absolute;
    inset: 0;
    border-radius: 6px;
    background: linear-gradient(135deg, rgba(228, 218, 196, 0.3) 0%, transparent 60%);
    pointer-events: none;
  }

  .info-card p {
    font-family: 'DM Sans', sans-serif;
    font-size: 16px;
    font-weight: 400;
    line-height: 1.65;
    color: #1E2820;
  }

  .info-card .label {
    font-family: 'DM Mono', monospace;
    font-size: 11px;
    font-weight: 500;
    text-transform: uppercase;
    letter-spacing: 2.5px;
    color: #C07030;
    margin-bottom: 10px;
    display: block;
  }

  /* Bottom-right decorative corner mark */
  .corner-mark {
    position: absolute;
    bottom: 60px;
    right: 80px;
    z-index: 2;
    display: flex;
    align-items: center;
    gap: 12px;
    opacity: 0;
    animation: fadeIn 0.6s ease-out 1.4s forwards;
  }

  .corner-dot {
    width: 8px; height: 8px;
    border-radius: 50%;
    background: #C07030;
  }

  .corner-line {
    width: 40px; height: 2px;
    background: rgba(240, 232, 210, 0.25);
  }

  /* Top-left subtle mark */
  .top-mark {
    position: absolute;
    top: 60px;
    left: 120px;
    z-index: 2;
    opacity: 0;
    animation: fadeIn 0.6s ease-out 1.3s forwards;
  }

  .top-mark span {
    font-family: 'DM Mono', monospace;
    font-size: 11px;
    text-transform: uppercase;
    letter-spacing: 2px;
    color: rgba(240, 232, 210, 0.35);
  }

  /* Animations */
  @keyframes fadeUp {
    to { opacity: 1; transform: translateY(0); }
  }

  @keyframes scaleIn {
    to { opacity: 1; transform: scaleX(1); }
  }

  @keyframes fadeIn {
    to { opacity: 1; }
  }

  /* Reduced motion */
  @media (prefers-reduced-motion: reduce) {
    .kicker, .title, .subtitle, .info-card, .corner-mark, .top-mark {
      animation: none !important;
      opacity: 1 !important;
      transform: none !important;
    }
    .divider {
      animation: none !important;
      opacity: 1 !important;
      transform: scaleX(1) !important;
    }
  }
</style>
</head>
<body>

<div class="viewport">
  <div class="stage" id="stage">

    <div class="top-mark">
      <span>Presentación</span>
    </div>

    <div class="slide-content">
      <div class="kicker">6to Informática</div>

      <h1 class="title">Ingeniería del Mantenimiento de Software</h1>

      <p class="subtitle">La realidad del ciclo de vida del código</p>

      <div class="divider"></div>

      <div class="info-card">
        <span class="label">Docente y Equipo</span>
        <p>Docente: <strong>Paula Ávila</strong><br>Estudiantes: Santiago Cañal, Nicolás Paz Reyes, Valentino Aviani, Martín Moloeznik<br>Instituto Politécnico Superior Gral. San Martín</p>
      </div>
    </div>

    <div class="corner-mark">
      <div class="corner-dot"></div>
      <div class="corner-line"></div>
    </div>

  </div>
</div>

<script>
  (function () {
    const stage = document.getElementById('stage');
    const viewport = stage.parentElement;

    function scale() {
      const vw = viewport.clientWidth;
      const vh = viewport.clientHeight;
      const sw = 1920;
      const sh = 1080;
      const ratio = Math.min(vw / sw, vh / sh);
      stage.style.transform = 'scale(' + ratio + ')';
    }

    scale();
    window.addEventListener('resize', scale);
  })();
</script>

</body>
</html>
